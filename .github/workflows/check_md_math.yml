name: check-md-math

on:
  push:
    branches: [main]
    paths:
      - "**.md"
      - "src/wpmwlib/check_md_math.py"
      - ".github/workflows/check_md_math.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.md"
      - "src/wpmwlib/check_md_math.py"
      - ".github/workflows/check_md_math.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm render engines
        run: npm install --no-save katex mathjax-full

      - name: Run markdown math linter
        run: PYTHONPATH=src python -m wpmwlib.check_md_math docs/ README.md
